<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or 'Mail Archive' }}</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="container row between center">
      <div>
        <h1 class="app-title"><a href="/">{{ request.app.title }}</a></h1>
        <p class="muted">로컬 FastAPI 메일 아카이브</p>
      </div>
      <nav class="nav">
        <a href="/">대시보드</a>
        <a href="/messages">메일 목록</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
